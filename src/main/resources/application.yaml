server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/estoque
    username: demo
    password: demo
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  mvc:
    problemdetails:
      enabled: true

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG

security:
  jwt:
    public-key-path: classpath:app.pub

produtos:
  api:
    url: http://localhost:8081